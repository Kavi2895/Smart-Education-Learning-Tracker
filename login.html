<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
}

.box{
display:block;
width:250px;
padding:10px;
margin:10px 0;
border:1px solid gray;
border-radius:5px;
}

button{
width:270px;
padding:10px;
background:green;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

a{
display:block;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<input class="box" id="username" placeholder="Username">
<input class="box" id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<a href="register.html">Create Account</a>

</div>

<script>

function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

let storedUser=localStorage.getItem("username");
let storedPass=localStorage.getItem("password");

if(username===storedUser && password===storedPass){

localStorage.setItem("loggedUser",username);
window.location="index.html";

}
else{
alert("Invalid Login");
}

}

</script>

</body>
</html>
